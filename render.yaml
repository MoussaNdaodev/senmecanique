services:
  - type: web
    name: sen Mecanique
    env: docker
    plan: free
    autoDeploy: true
    buildCommand: "composer install --no-dev --optimize-autoloader"
    startCommand: "php artisan serve --host=0.0.0.0 --port=80"
    postDeployCommand: "php artisan migrate --force"
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: LOG_CHANNEL
        value: stderr
